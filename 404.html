<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>404: Not Found | Guys Who Code</title>
        <link rel="icon" type="image/svg+xml" href="/assets/img/logo.svg" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="/assets/img/favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="/assets/img/favicon-16x16.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/assets/img/apple-touch-icon.png"
        />
        <style>
            /* ============================================================
               CSS Custom Properties
               ============================================================ */
            :root {
                --green: #33bb77;
                --blue: #3399dd;
                --green-glow: rgba(51, 187, 119, 0.12);
                --blue-glow: rgba(51, 153, 221, 0.12);
                --bg: #070809;
                --bg-alt: #0d0f10;
                --bg-card: #121416;
                --bg-card-hover: #181b1d;
                --text: #e8eaed;
                --text-rgb: 232, 234, 237;
                --text-secondary: #9aa0a6;
                --text-dim: #5f656b;
                --border: rgba(255, 255, 255, 0.05);
                --border-hover: rgba(255, 255, 255, 0.12);
                --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.35);
                --shadow-hover:
                    0 24px 48px rgba(51, 187, 119, 0.15),
                    0 8px 16px rgba(0, 0, 0, 0.4);
                --radius: 30px;
                --radius-sm: 15px;
                --hero-bg: linear-gradient(180deg, #0d0f10 0%, #070809 100%);
                --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
                --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
                --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            }

            [data-theme="light"] {
                --green: #2daa6b;
                --blue: #2b8bcc;
                --green-glow: rgba(45, 170, 107, 0.08);
                --blue-glow: rgba(43, 139, 204, 0.08);
                --hero-bg: linear-gradient(180deg, #f4f5f7 0%, #ffffff 100%);
                --bg: #f4f5f7;
                --bg-alt: #ffffff;
                --bg-card: #ffffff;
                --bg-card-hover: #f8f9fa;
                --text: #1f2937;
                --text-rgb: 31, 41, 55;
                --text-secondary: #6b7280;
                --text-dim: #9ca3af;
                --border: rgba(0, 0, 0, 0.07);
                --border-hover: rgba(0, 0, 0, 0.15);
                --shadow-card: 0 1px 4px rgba(0, 0, 0, 0.05);
                --shadow-hover: 0 20px 40px rgba(0, 0, 0, 0.08);
            }

            /* ============================================================
               Reset & Base
               ============================================================ */
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html {
                scroll-behavior: smooth;
            }

            body {
                font-family: "Source Code Pro", monospace;
                background: var(--bg);
                color: var(--text);
                line-height: 1.7;
                transition:
                    background 0.5s ease,
                    color 0.5s ease;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                overflow-x: hidden;
                cursor: default;
            }

            h1,
            h2,
            h3,
            .logo {
                font-family: "Source Code Pro", monospace;
            }

            /* ============================================================
               Noise texture overlay
               ============================================================ */
            body::after {
                content: "";
                position: fixed;
                inset: 0;
                z-index: 9999;
                pointer-events: none;
                opacity: 0.025;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
                background-repeat: repeat;
                background-size: 256px 256px;
            }

            /* ============================================================
               Container
               ============================================================ */
            .container {
                max-width: 960px;
                margin: 0 auto;
                padding: 0 2rem;
                position: relative;
                z-index: 1;
            }

            /* ============================================================
               Navigation
               ============================================================ */
            nav {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 100;
                padding: 0 2rem;
                transition:
                    background 0.4s ease,
                    backdrop-filter 0.4s ease,
                    box-shadow 0.4s ease;
            }

            nav::before {
                content: "";
                position: absolute;
                inset: 0;
                background: var(--bg);
                opacity: 0;
                transition: opacity 0.4s ease;
                pointer-events: none;
            }

            nav.scrolled::before {
                opacity: 0.72;
            }

            nav.scrolled {
                backdrop-filter: blur(18px) saturate(1.5);
                -webkit-backdrop-filter: blur(18px) saturate(1.5);
                box-shadow: 0 1px 0 var(--border);
            }

            .nav-inner {
                display: flex;
                justify-content: space-between;
                align-items: center;
                height: 64px;
                position: relative;
                z-index: 1;
                max-width: 1100px;
                margin: 0 auto;
            }

            .logo {
                font-size: 1.1rem;
                font-weight: 700;
                color: var(--text);
                letter-spacing: -0.03em;
                display: flex;
                align-items: center;
                gap: 0.6rem;
                user-select: none;
            }

            .logo-mark {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 30px;
                height: 30px;
                border-radius: 8px;
                background: linear-gradient(135deg, var(--green), var(--blue));
                position: relative;
                overflow: hidden;
            }

            .logo-mark::after {
                content: "&lt;/&gt;";
                font-size: 0.55rem;
                font-weight: 700;
                color: #fff;
                font-family: "Source Code Pro", monospace;
                letter-spacing: 0;
            }

            .nav-actions {
                display: flex;
                align-items: center;
                gap: 0.75rem;
            }

            #theme-toggle {
                background: transparent;
                border: none;
                color: var(--text-dim);
                width: 40px;
                height: 40px;
                border-radius: 8px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.95rem;
                transition: color 0.25s var(--ease);
            }

            #theme-toggle:hover {
                color: var(--text-secondary);
            }

            /* ============================================================
               404 Page
               ============================================================ */
            .hero {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                position: relative;
                padding: 7rem 0 5rem;
                overflow: hidden;
                background: var(--hero-bg);
            }

            .hero-grid-dots {
                position: absolute;
                inset: 0;
                background-image: radial-gradient(
                    var(--border) 1px,
                    transparent 1px
                );
                background-size: 40px 40px;
                mask-image: radial-gradient(
                    ellipse 60% 60% at center,
                    black 20%,
                    transparent 70%
                );
                -webkit-mask-image: radial-gradient(
                    ellipse 60% 60% at center,
                    black 20%,
                    transparent 70%
                );
                pointer-events: none;
            }

            @keyframes fadeSlideUp {
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes gradientShift {
                0%,
                100% {
                    background-position: 0% 50%;
                }
                50% {
                    background-position: 100% 50%;
                }
            }

            .hero-content {
                position: relative;
                z-index: 1;
            }

            .hero-title {
                font-size: clamp(2.8rem, 7vw, 5rem);
                font-weight: 700;
                line-height: 1.08;
                letter-spacing: -0.04em;
                background: linear-gradient(
                    135deg,
                    var(--green) 0%,
                    var(--blue) 50%,
                    var(--green) 100%
                );
                background-size: 200% 200%;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                animation: gradientShift 6s ease-in-out infinite;
                opacity: 0;
                transform: translateY(20px);
                animation:
                    gradientShift 6s ease-in-out infinite,
                    fadeSlideUp 0.7s var(--ease-out) 0.2s forwards;
            }

            .hero-quote {
                color: var(--text-secondary);
                font-size: clamp(1rem, 2vw, 1.2rem);
                margin-top: 1.5rem;
                font-weight: 400;
                letter-spacing: 0.01em;
                line-height: 1.75;
                opacity: 0;
                transform: translateY(20px);
                animation: fadeSlideUp 0.7s var(--ease-out) 0.4s forwards;
                font-style: italic;
            }

            .hero-attribution {
                display: block;
                margin-top: 0.75rem;
                font-style: normal;
                font-weight: 600;
                color: var(--text-dim);
                font-size: 0.9rem;
                opacity: 0;
                transform: translateY(20px);
                animation: fadeSlideUp 0.7s var(--ease-out) 0.5s forwards;
            }

            .btn-home {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                margin-top: 2.5rem;
                background: transparent;
                border: 1px solid var(--border-hover);
                color: var(--text-secondary);
                padding: 0.85rem 2rem;
                text-decoration: none;
                border-radius: var(--radius-sm);
                font-family: "Source Code Pro", monospace;
                font-weight: 600;
                font-size: 0.9rem;
                transition: all 0.35s var(--ease);
                opacity: 0;
                transform: translateY(20px);
                animation: fadeSlideUp 0.7s var(--ease-out) 0.6s forwards;
            }

            .btn-home:hover {
                background: var(--green);
                color: #fff;
                border-color: var(--green);
                transform: translateY(-2px);
                box-shadow: 0 12px 24px rgba(51, 187, 119, 0.25);
            }

            .btn-home i {
                font-size: 0.75rem;
                transition: transform 0.3s var(--ease);
            }

            .btn-home:hover i {
                transform: translateX(-3px);
            }

            /* ============================================================
               Footer
               ============================================================ */
            footer {
                text-align: center;
                padding: 3rem 2rem;
                border-top: 1px solid var(--border);
                color: var(--text-dim);
                font-size: 0.85rem;
                position: relative;
                z-index: 1;
            }

            footer span {
                color: var(--green);
            }

            /* ============================================================
               Back to Top
               ============================================================ */
            #backToTop {
                position: fixed;
                bottom: 28px;
                right: 28px;
                width: 44px;
                height: 44px;
                border-radius: 50%;
                background: var(--bg-card);
                color: var(--text-secondary);
                border: 1px solid var(--border);
                box-shadow: var(--shadow-hover);
                cursor: pointer;
                font-size: 1rem;
                z-index: 200;
                transition: all 0.35s var(--ease);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                opacity: 0;
                transform: translateY(12px) scale(0.9);
                pointer-events: none;
            }

            #backToTop.visible {
                opacity: 1;
                transform: translateY(0) scale(1);
                pointer-events: auto;
            }

            #backToTop:hover {
                background: var(--green);
                color: #fff;
                border-color: var(--green);
                transform: translateY(-3px);
                box-shadow: 0 12px 24px rgba(51, 187, 119, 0.25);
            }

            /* ============================================================
               Responsive
               ============================================================ */
            @media (max-width: 640px) {
                .container {
                    padding: 0 1.25rem;
                }
                nav {
                    padding: 0 1.25rem;
                }
                .hero {
                    min-height: 90vh;
                    padding: 5rem 0 3rem;
                }
                .btn-home {
                    padding: 0.75rem 1.5rem;
                    font-size: 0.85rem;
                }
                #backToTop {
                    bottom: 20px;
                    right: 20px;
                    width: 40px;
                    height: 40px;
                }
            }
        </style>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        />
    </head>
    <body>
        <!-- Navigation -->
        <nav id="navbar">
            <div class="nav-inner">
                <div class="logo">
                    <a
                        href="/"
                        style="
                            display: flex;
                            align-items: center;
                            gap: 0.6rem;
                            text-decoration: none;
                            color: inherit;
                        "
                    >
                        <img
                            src="/assets/img/logo.svg"
                            alt="Guys Who Code"
                            width="30"
                            height="30"
                            style="border-radius: 8px"
                        />
                        Guys Who Code
                    </a>
                </div>
                <div class="nav-actions">
                    <button id="theme-toggle" aria-label="Toggle Dark Mode">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </nav>

        <!-- 404 Hero -->
        <header class="hero" id="hero">
            <div class="hero-grid-dots"></div>
            <div class="hero-content container">
                <h1 class="hero-title">404: Not Found</h1>
                <p class="hero-quote">
                    "I've looked everywhere. The database, the cache, behind the server rack, even in the office fridge. It's just not here."
                    <span class="hero-attribution">— The Server</span>
                </p>
                <a href="/" class="btn-home">
                    <i class="fas fa-arrow-left"></i>
                    Return Home
                </a>
            </div>
        </header>

        <!-- Footer -->
        <footer>
            <p>&copy; 2026 Guys Who Code. Built with <span>passion</span>.</p>
        </footer>

        <!-- Back to Top -->
        <button id="backToTop" title="Go to top">
            <i class="fas fa-arrow-up"></i>
        </button>

        <!-- ============================================================
        JavaScript
        ============================================================ -->
        <script>
            (function () {
                "use strict";

                /* -------- Navbar scroll state ---------- */
                const navbar = document.getElementById("navbar");

                window.addEventListener("scroll", () => {
                    if (window.scrollY > 40) {
                        navbar.classList.add("scrolled");
                    } else {
                        navbar.classList.remove("scrolled");
                    }
                });

                /* -------- Theme toggle ---------- */
                const themeToggle = document.getElementById("theme-toggle");
                const htmlEl = document.documentElement;
                const icon = themeToggle.querySelector("i");

                themeToggle.addEventListener("click", () => {
                    if (htmlEl.getAttribute("data-theme") === "dark") {
                        htmlEl.setAttribute("data-theme", "light");
                        icon.classList.replace("fa-moon", "fa-sun");
                    } else {
                        htmlEl.setAttribute("data-theme", "dark");
                        icon.classList.replace("fa-sun", "fa-moon");
                    }
                });

                /* -------- Back to Top ---------- */
                const backBtn = document.getElementById("backToTop");

                window.addEventListener("scroll", () => {
                    if (
                        document.body.scrollTop > 300 ||
                        document.documentElement.scrollTop > 300
                    ) {
                        backBtn.classList.add("visible");
                    } else {
                        backBtn.classList.remove("visible");
                    }
                });

                backBtn.addEventListener("click", () => {
                    window.scrollTo({ top: 0, behavior: "smooth" });
                });
            })();
        </script>
    </body>
</html>
